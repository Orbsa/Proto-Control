name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git tag check

      # ── Read version from Cargo.toml ─────────────────────────────────────
      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' daemon/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"    >> "$GITHUB_OUTPUT"

      # ── Skip if this tag already exists ──────────────────────────────────
      - name: Check if tag exists
        id: tag_check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Nix build (reproducible, for NixOS users) ────────────────────────
      # Stage tray icon into daemon/assets/ for the build
      - name: Stage tray icon
        if: steps.tag_check.outputs.exists == 'false'
        run: cp melbourne.png daemon/assets/tray.png

      - name: Install Nix
        if: steps.tag_check.outputs.exists == 'false'
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix binary cache
        if: steps.tag_check.outputs.exists == 'false'
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build with Nix
        if: steps.tag_check.outputs.exists == 'false'
        run: nix build --print-build-logs

      - name: Stage Nix binary
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cp result/bin/proto-control \
            "proto-control-${{ steps.version.outputs.version }}-linux-x86_64-nix"

      # ── Dynamic build (for generic glibc Linux systems) ───────────────────
      - name: Install system dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libasound2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev

      - name: Install Rust toolchain
        if: steps.tag_check.outputs.exists == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Build dynamic binary
        if: steps.tag_check.outputs.exists == 'false'
        run: cargo build --release --manifest-path daemon/Cargo.toml

      - name: Stage dynamic binary
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cp daemon/target/release/proto-control \
            "proto-control-${{ steps.version.outputs.version }}-linux-x86_64"

      # ── Source tarball ────────────────────────────────────────────────────
      - name: Create source tarball
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git archive \
            --format=tar.gz \
            --prefix="proto-control-${{ steps.version.outputs.version }}/" \
            HEAD \
            > "proto-control-${{ steps.version.outputs.version }}-source.tar.gz"

      # ── Stage TS3 plugin ──────────────────────────────────────────────────
      - name: Stage TS3 plugin
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cp ts3plugin/rotocontrol_ts3_linux_amd64.so \
            "proto-control-ts3-plugin_linux_amd64.so"

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Proto-Control ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: |
            proto-control-${{ steps.version.outputs.version }}-linux-x86_64
            proto-control-${{ steps.version.outputs.version }}-linux-x86_64-nix
            proto-control-ts3-plugin_linux_amd64.so
            proto-control-${{ steps.version.outputs.version }}-source.tar.gz
